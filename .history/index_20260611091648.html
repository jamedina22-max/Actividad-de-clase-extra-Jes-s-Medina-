<!DOCTYPE html>
<html lang="es" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MultiStore PWA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        // Configuración de Tailwind para modo oscuro por clase
        tailwind.config = { darkMode: 'class' }
    </script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-gray-50 text-gray-900 dark:bg-gray-900 dark:text-gray-100 min-h-screen flex flex-col transition-colors duration-300">

    <nav class="bg-white dark:bg-gray-800 shadow-md sticky top-0 z-50 px-4 py-3 flex justify-between items-center">
        
        <div class="flex items-center space-x-4">
        <button onclick="navigate('landing')" class="p-2 rounded-lg bg-gray-100 dark:bg-gray-700 hover:bg-gray-200 dark:hover:bg-gray-600 transition flex items-center space-x-1 text-sm font-medium">
        <i data-lucide="arrow-left" class="w-4 h-4"></i>
        <span class="hidden sm:inline">Regresar</span>
        </button>

        <a href="#" onclick="navigate('landing')" class="text-xl font-bold tracking-wider text-indigo-600 dark:text-indigo-400">MULTISTORE</a>
    
        <div id="nav-links" class="hidden md:flex space-x-4">
        <button onclick="navigate('catalog')" class="hover:text-indigo-500">Catálogo</button>
        <button id="btn-admin-panel" onclick="navigate('admin')" class="hidden hover:text-red-500 font-semibold">Panel Admin</button>
        </div>
        </div>
        
        <div class="flex items-center space-x-4">
            <a href="#" onclick="navigate('landing')" class="text-xl font-bold tracking-wider text-indigo-600 dark:text-indigo-400">MULTISTORE</a>
            <div id="nav-links" class="hidden md:flex space-x-4">
                <button onclick="navigate('catalog')" class="hover:text-indigo-500">Catálogo</button>
                <button id="btn-admin-panel" onclick="navigate('admin')" class="hidden hover:text-red-500 font-semibold">Panel Admin</button>
            </div>
        </div>
        
        <div class="flex items-center space-x-4">
            <button id="theme-toggle" class="p-2 rounded-full hover:bg-gray-200 dark:hover:bg-gray-700">
                <i data-lucide="moon" class="w-5 h-5 block dark:hidden"></i>
                <i data-lucide="sun" class="w-5 h-5 hidden dark:block"></i>
            </button>
            <button onclick="navigate('cart')" class="relative p-2">
                <i data-lucide="shopping-cart" class="w-6 h-6"></i>
                <span id="cart-count" class="absolute -top-1 -right-1 bg-red-500 text-white text-xs rounded-full px-1.5 py-0.5">0</span>
            </button>
            <div id="auth-zone">
                <button onclick="navigate('login')" class="bg-indigo-600 text-white px-4 py-1.5 rounded-lg text-sm hover:bg-indigo-700">Ingresar</button>
            </div>
        </div>
    </nav>

    <main id="main-content" class="flex-grow container mx-auto px-4 py-6">
        </main>

    <footer class="bg-gray-100 dark:bg-gray-800 border-t border-gray-200 dark:border-gray-700 mt-auto py-6 px-4 text-center">
        <div class="flex flex-col md:flex-row justify-between items-center max-w-6xl mx-auto space-y-4 md:space-y-0">
            <p class="text-sm text-gray-500 dark:text-gray-400">&copy; 2026 MultiStore. Proyecto Educativo PWA.</p>
            
            <div id="connection-status" class="flex items-center space-x-2 text-sm font-medium px-3 py-1 rounded-full bg-green-100 text-green-800 dark:bg-green-900 dark:text-green-200">
                <span class="w-2.5 h-2.5 bg-green-500 rounded-full animate-pulse"></span>
                <span>Modo Online</span>
            </div>
        </div>
    </footer>

    <script src="js/storage.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/catalog.js"></script>
    <script src="js/admin.js"></script>
    <script src="js/app.js"></script>
</body>
</body>
</html>
