<!DOCTYPE html>
<html lang="es" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoMarket PWA - Tu Tienda Autónoma</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        // Configuración exclusiva de Tailwind por clases
        tailwind.config = { darkMode: 'class' }
    </script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-slate-50 text-slate-900 dark:bg-slate-900 dark:text-slate-100 min-h-screen flex flex-col transition-colors duration-200">

    <nav class="bg-white dark:bg-slate-800 shadow-sm border-b border-slate-100 dark:border-slate-700 sticky top-0 z-50 px-6 py-4 flex justify-between items-center">
        
        <div class="flex items-center space-x-4">
            <button onclick="navigate('landing')" class="p-2 rounded-xl bg-slate-100 dark:bg-slate-700 hover:bg-slate-200 dark:hover:bg-slate-600 transition flex items-center space-x-1 text-xs font-bold tracking-wide">
                <i data-lucide="arrow-left" class="w-4 h-4"></i>
                <span class="hidden sm:inline">Atrás</span>
            </button>

            <span class="text-lg font-black tracking-widest text-emerald-600 dark:text-emerald-400 select-none">ECO-MARKET</span>
            
            <div id="nav-links" class="hidden md:flex space-x-2">
                <button onclick="navigate('catalog')" class="text-xs font-bold uppercase px-3 py-2 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-700 transition">Explorar</button>
                <button id="btn-admin-panel" onclick="navigate('admin')" class="hidden text-xs font-black uppercase px-3 py-2 rounded-lg bg-rose-50 text-rose-600 dark:bg-rose-950/40 dark:text-rose-400 transition">Consola Admin</button>
            </div>
        </div>
        
        <div class="flex items-center space-x-3">
            <button id="theme-toggle" class="p-2.5 rounded-xl bg-slate-50 dark:bg-slate-700 hover:bg-slate-100 dark:hover:bg-slate-600 transition">
                <i data-lucide="moon" class="w-4 h-4 block dark:hidden"></i>
                <i data-lucide="sun" class="w-4 h-4 hidden dark:block"></i>
            </button>
            
            <button id="btn-cart-global" onclick="navigate('cart')" class="relative p-2.5 rounded-xl bg-slate-50 dark:bg-slate-700 hover:bg-slate-100 dark:hover:bg-slate-600 transition">
                <i data-lucide="shopping-bag" class="w-4 h-4"></i>
                <span id="cart-count" class="absolute -top-1 -right-1 bg-emerald-600 text-white text-[10px] font-bold rounded-full w-4 h-4 flex items-center justify-center">0</span>
            </button>
            
            <div id="auth-zone">
                <button onclick="navigate('login')" class="bg-emerald-600 text-white px-4 py-2 rounded-xl text-xs font-bold hover:bg-emerald-700 transition shadow-sm">Acceder</button>
            </div>
        </div>
    </nav>

    <main id="main-content" class="flex-grow container mx-auto px-4 py-8">
    </main>

    <footer class="bg-slate-100 dark:bg-slate-800 border-t border-slate-200 dark:border-slate-700 mt-auto py-6 px-6 text-center">
        <div class="flex flex-col md:flex-row justify-between items-center max-w-6xl mx-auto space-y-4 md:space-y-0 text-xs font-medium text-slate-500 dark:text-slate-400">
            <p>&copy; 2026 EcoMarket. Desarrollo Vanilla Frontend sin Frameworks.</p>
            
            <div id="connection-status" class="flex items-center space-x-2 px-3 py-1.5 rounded-xl bg-green-100 text-green-800 dark:bg-green-900/40 dark:text-green-300">
                <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span>
                <span class="font-bold tracking-wide uppercase text-[10px]">Sincronizado Online</span>
            </div>
        </div>
    </footer>

    <script src="js/storage.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/catalog.js"></script>
    <script src="js/admin.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
